name: Bug Report
description: Report a reproducible defect in InscuraScraper.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill out as much of
        the template as you can — the more detail, the faster we can help.
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `./inscurascraper-server --version` or the git SHA.
      placeholder: "v0.0.1 / abc1234"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: How are you running it?
      options:
        - Binary (make / make server)
        - Docker / docker compose
        - Go SDK (import as library)
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include observed vs expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands, API calls, or code that reproduces the issue.
      placeholder: |
        1. Start the server with `...`
        2. Call `GET /v1/movies/tmdb/...`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack traces
      render: shell
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Go version, database (SQLite/PostgreSQL), provider config.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest release or `main`.
          required: true
