services:
  inscurascraper:
    image: inscurascraper-server:latest
    container_name: inscurascraper
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - IS_PROVIDER_TMDB__API_TOKEN=
      - IS_PROVIDER_FANARTTV__API_KEY=
      - IS_PROVIDER_TVDB__API_KEY=
      - IS_PROVIDER_TVMAZE__API_KEY=
    volumes:
      - run:/var/run
    command: -dsn "postgres://inscurascraper:inscurascraper@/inscurascraper?host=/var/run/postgresql" -port 8080 -db-auto-migrate -db-prepared-stmt

  postgres:
    image: postgres:15-alpine
    container_name: inscurascraper-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=inscurascraper
      - POSTGRES_PASSWORD=inscurascraper
      - POSTGRES_DB=inscurascraper
    volumes:
      - ./db:/var/lib/postgresql/data
      - run:/var/run
    command: "-c TimeZone=Asia/Shanghai -c log_timezone=Asia/Shanghai -c listen_addresses='' -c unix_socket_permissions=0777"

volumes:
  run:
